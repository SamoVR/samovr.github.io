<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Samo_VR</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shared.css">
<style>
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 60% 50% at 50% 30%,rgba(127,119,221,.07),transparent);padding:2rem;text-align:center}
  .wrap{max-width:480px}
  .glitch-code{
    font-family:var(--mono);font-weight:700;
    font-size:clamp(4rem,18vw,7rem);line-height:1;
    color:var(--accent);letter-spacing:-.02em;margin-bottom:.5rem;
    text-shadow:0 0 40px rgba(127,119,221,.35);
  }
  .heading{font-family:var(--mono);font-size:1.3rem;font-weight:700;margin-bottom:.85rem;letter-spacing:-.01em}
  .message{font-size:14.5px;color:var(--muted);line-height:1.75;margin-bottom:2rem}
  .back-btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:13px;font-weight:500;color:#fff;background:var(--accent);padding:11px 26px;border-radius:var(--r);text-decoration:none;transition:background .2s}
  .back-btn:hover{background:#9189e8}
  .crumb-trail{margin-top:2.5rem;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em}
  .crumb-trail span{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <div class="glitch-code" id="nf-code">404</div>
  <div class="heading" id="nf-heading">Lost in the build folder.</div>
  <p class="message" id="nf-message">The page you're looking for doesn't exist - it might have been moved, renamed, or never built in the first place.</p>
  <a class="back-btn" id="nf-btn" href="index.html">← Back to Home</a>
  <div class="crumb-trail"><span>Samo_VR</span> · Page not found</div>
</div>

<script src="js/shared-data.js"></script>
<script>
  // Content is editable from Admin → Settings → 404 Page. Falls back to
  // DEFAULT if nothing has been saved yet (e.g. fresh GitHub Pages deploy
  // before the admin has been run locally even once).
  (function () {
    const settings = loadState('settings');
    const nf = (settings && settings.notFound) || DEFAULT.settings.notFound;
    document.title = (nf.title || '404') + ' - Samo_VR';
    document.getElementById('nf-code').textContent = nf.title || '404';
    document.getElementById('nf-heading').textContent = nf.heading || '';
    document.getElementById('nf-message').textContent = nf.message || '';
    const btn = document.getElementById('nf-btn');
    btn.textContent = nf.buttonText || '← Back to Home';
    btn.href = nf.buttonLink || 'index.html';
  })();
</script>
</body>
</html>
